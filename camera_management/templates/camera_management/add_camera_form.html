{% load i18n %}
<!-- Camera Form (Hidden by default) -->
<div id="cameraForm" class="asset-form-section d-none">
    <div class="mb-3"><label class="form-label">{% trans "Camera Name" %}</label><input type="text" id="cameraName" class="form-control" placeholder="e.g. Thermal Cam 1"></div>
    <div class="mb-3"><label class="form-label">{% trans "Camera ID" %}</label><input type="text" id="cameraId" class="form-control" placeholder="e.g. CAM-XY-9"></div>
    <div class="mb-3"><label class="form-label">{% trans "API Key (Optional)" %}</label><input type="text" id="cameraApiKey" class="form-control"></div>
    
    <!-- Hidden position fields for Camera -->
    <input type="hidden" id="cam_latitude">
    <input type="hidden" id="cam_longitude">
    <input type="hidden" id="cam_parcelle">
    <input type="hidden" id="cameraPosition">
</div>
