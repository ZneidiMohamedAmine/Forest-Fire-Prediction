name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  pytest:
    runs-on: ubuntu-latest
    container:
      image: python:3.9-alpine

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          apk add --no-cache \
            build-base \
            gdal-dev \
            geos-dev \
            postgresql-dev \
            proj-dev

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            Django==4.2.11 \
            pytest==8.4.2 \
            pytest-django==4.11.1 \
            celery==5.5.3 \
            daphne==4.1.2 \
            channels==4.3.1 \
            channels-redis==4.3.0 \
            django-location-field==2.7.3 \
            django-redis==5.4.0 \
            joblib==1.5.1 \
            paho-mqtt==2.1.0 \
            psycopg2-binary==2.9.9 \
            redis==6.2.0 \
            whitenoise==6.6.0 \
            pillow==10.3.0

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: project.settings.development
          GDAL_LIBRARY_PATH: /usr/lib/libgdal.so
        run: pytest tests/test_health.py

  security:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Prepare Linux dependency audit file
        run: |
          grep -Ev "^(GDAL @|twisted-iocpsupport==|psycopg2==)" requirements.txt > requirements-audit.txt

      - name: Run pip-audit dependency scan
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements-audit.txt

      - name: Run Bandit Python SAST
        uses: PyCQA/bandit-action@v1
        with:
          targets: .
          skips: B101
          exclude: .git,.github,venv,.venv,env,__pycache__,staticfiles,logs,img,client/static,home/static,supervisor/static

      - name: Run Gitleaks secret detection
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --no-git --redact --source .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run SonarCloud analysis
        if: env.SONAR_TOKEN != '' && env.SONAR_ORGANIZATION != '' && env.SONAR_PROJECT_KEY != ''
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          args: >
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.sources=.
            -Dsonar.exclusions=venv/**,.venv/**,env/**,staticfiles/**,logs/**,img/**,client/static/**,home/static/**,supervisor/static/**,**/__pycache__/**
            -Dsonar.python.version=3.9

  publish-image:
    needs:
      - pytest
      - security
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set image name
        run: echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          provenance: false
          sbom: false
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push image
        run: |
          docker push "${IMAGE_NAME}:latest"
          docker push "${IMAGE_NAME}:${GITHUB_SHA}"
